tock:
  # Base URL of the Tock instance (no trailing slash)
  base_url: "https://demo.tock.ai"
  # Tock namespace
  namespace: "app"
  # Bot name
  bot: "howtonet"
  # Web-connector identifier
  connector: "howtonetweb"
  # User ID sent to Tock with every request
  user_id: "mcp-user-001"
  # Optional extra HTTP headers forwarded to the Tock web-connector.
  # The value is the default used when the MCP caller does not provide one.
  # Leave empty ("") to make the header optional with no default.
  extra_headers:
    X-Toki-Origin: ""   # always sent; can be overridden by the caller
    X-Toki-Filter: ""                 # no default — provided by the caller if needed

server:
  # HTTP listen address of the MCP server
  addr: ":8083"
  # Name of the MCP tool exposed to AI clients. Defaults to "ask_tock" if empty.
  tool_name: "ask_tock"
  # Description of the MCP tool exposed to AI clients.
  # This text helps the AI decide when and how to call the tool.
  # Leave empty to use the built-in default.
  tool_description: "Ask a question to the Tock documentary chatbot (RAG). Returns the text response and links to source documents."
  # Description of the "question" input parameter shown to AI clients.
  # This guides the AI on what to include in the question.
  # Leave empty to use the built-in default.
  input_question_description: "Question to ask the Tock chatbot (RAG). Include context, error messages, version, environment, or desired objective if available."

# OAuth 2.1 Resource Server configuration.
# When enabled, the /mcp endpoint requires a valid Bearer token.
# The /health endpoint is never protected.
oauth:
  # Set to true to enable OAuth 2.1 token validation on /mcp.
  enabled: false
  # Token issuer (iss claim). Also used for OIDC Discovery when jwks_url is empty.
  # Example: "https://auth.example.com/realms/my-realm"
  issuer: ""
  # Explicit JWKS endpoint URL. If empty, derived automatically from issuer
  # via OIDC Discovery ({issuer}/.well-known/openid-configuration).
  # Example: "https://auth.example.com/realms/my-realm/protocol/openid-connect/certs"
  jwks_url: ""
  # Expected audience (aud claim). Leave empty to skip audience verification.
  audience: ""
  # Scopes that must be present in the token's "scope" claim.
  # Leave empty to skip scope verification.
  required_scopes: []

