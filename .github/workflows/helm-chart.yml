# .github/workflows/helm-chart.yml
#
# Builds, lints, packages and publishes the Helm chart to the GitHub Container
# Registry (GHCR) as an OCI artifact. Triggered only when a version tag is pushed.
#
# Chart is published to:
#   oci://ghcr.io/<owner>/charts/tock-mcp-server:<version>
#
# The chart version and appVersion are derived from the git tag (e.g. v1.2.3):
#   version:    1.2.3   (semver, no "v" prefix — required by Helm)
#   appVersion: v1.2.3  (full tag, matching the container image tag)

name: helm-chart

on:
  push:
    tags:
      - "chart-v*"
  workflow_dispatch:
    inputs:
      chart_version:
        description: "Chart version to publish (e.g. 1.3.0)"
        required: true
        type: string
      app_version:
        description: "appVersion to set in Chart.yaml (e.g. 0.1.6) — leave empty to keep current"
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  publish-helm-chart:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve chart version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "chart_version=${{ inputs.chart_version }}" >> $GITHUB_OUTPUT
          else
            # Strip "chart-v" prefix from tag (e.g. chart-v1.3.0 → 1.3.0)
            echo "chart_version=${GITHUB_REF_NAME#chart-v}" >> $GITHUB_OUTPUT
          fi

      - name: Patch Chart.yaml versions
        run: |
          CHART_FILE=k8s/chart/Chart.yaml
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.chart_version }}/" $CHART_FILE
          if [ -n "${{ inputs.app_version }}" ]; then
            sed -i "s/^appVersion: .*/appVersion: \"${{ inputs.app_version }}\"/" $CHART_FILE
          fi
          echo "--- Chart.yaml after patch ---"
          cat $CHART_FILE

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Log in to GitHub Container Registry
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Lint Helm chart
        run: helm lint k8s/chart

      - name: Package Helm chart
        run: helm package k8s/chart --destination /tmp/helm-pkg

      - name: Push Helm chart to GHCR OCI registry
        run: |
          helm push \
            /tmp/helm-pkg/tock-mcp-server-${{ steps.version.outputs.chart_version }}.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Helm Chart v${{ steps.version.outputs.chart_version }}"
          body: |
            Helm chart release `tock-mcp-server` version `${{ steps.version.outputs.chart_version }}`.

            Install:
            ```bash
            helm install tock-mcp oci://ghcr.io/${{ github.repository_owner }}/charts/tock-mcp-server --version ${{ steps.version.outputs.chart_version }}
            ```
          files: tock-dataset-viewer/deploy/chart/*.tgz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "### ✅ Helm chart published and released" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Registry** | \`oci://ghcr.io/${{ github.repository_owner }}/charts\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Chart** | \`tock-mcp-server\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Version** | \`${{ steps.version.outputs.chart_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Install:**" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "helm install tock-mcp oci://ghcr.io/${{ github.repository_owner }}/charts/tock-mcp-server \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  --version ${{ steps.version.outputs.chart_version }} -f values.yaml" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"