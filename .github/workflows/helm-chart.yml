# .github/workflows/helm-chart.yml
#
# Builds, lints, packages and publishes the Helm chart to the GitHub Container
# Registry (GHCR) as an OCI artifact. Triggered only when a version tag is pushed.
#
# Chart is published to:
#   oci://ghcr.io/<owner>/charts/tock-mcp-server:<version>
#
# The chart version and appVersion are derived from the git tag (e.g. v1.2.3):
#   version:    1.2.3   (semver, no "v" prefix — required by Helm)
#   appVersion: v1.2.3  (full tag, matching the container image tag)

name: helm-chart

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  helm:
    name: Package and publish Helm chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      # Strip the "v" prefix from the tag to get a valid Helm semver.
      # e.g. refs/tags/v1.2.3 → VERSION=1.2.3
      - name: Extract chart version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "TAG=${GITHUB_REF_NAME}"  >> "$GITHUB_OUTPUT"

      # Patch Chart.yaml in-place so the packaged chart carries the release version.
      - name: Stamp Chart.yaml with release version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.VERSION }}/" k8s/chart/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.TAG }}\"/" k8s/chart/Chart.yaml
          echo "── Chart.yaml after stamping ──"
          grep -E '^(version|appVersion):' k8s/chart/Chart.yaml

      - name: Lint Helm chart
        run: helm lint k8s/chart

      - name: Package Helm chart
        run: helm package k8s/chart --destination /tmp/helm-pkg

      - name: Log in to GHCR (OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Push Helm chart to GHCR OCI registry
        run: |
          helm push \
            /tmp/helm-pkg/tock-mcp-server-${{ steps.version.outputs.VERSION }}.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Summary
        run: |
          echo "### ✅ Helm chart published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Registry** | \`oci://ghcr.io/${{ github.repository_owner }}/charts\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Chart** | \`tock-mcp-server\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Version** | \`${{ steps.version.outputs.VERSION }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Install:**" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "helm install tock-mcp oci://ghcr.io/${{ github.repository_owner }}/charts/tock-mcp-server \\" >> "$GITHUB_STEP_SUMMARY"
          echo "  --version ${{ steps.version.outputs.VERSION }} -f values.yaml" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

