replicaCount: 1

image:
  repository: ghcr.io/theopenconversationkit/tock-mcp-server
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8083

resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10

ingress:
  enabled: false
  # className: "nginx"
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: tock-mcp.example.com
      paths:
        - path: /mcp
          pathType: Prefix
  tls: []
  #  - secretName: tock-mcp-tls
  #    hosts:
  #      - tock-mcp.example.com

nodeSelector: {}
tolerations: []
affinity: {}

# Tock MCP configuration — will be mounted as ConfigMap at /config/config.yaml
config:
  tock:
    base_url: "https://demo.tock.ai"
    namespace: "app"
    bot: "howtonet"
    connector: "howtonetweb"
    user_id: "mcp-user-001"
  server:
    addr: ":8083"
    tool_name: "ask_tock"
    tool_description: "Ask a question to the Tock documentary chatbot (RAG). Returns the text response and links to source documents."
    input_question_description: "Question to ask the Tock chatbot (RAG). Include context, error messages, version, environment, or desired objective if available."
    # HTTP server timeouts (Go duration format: "5s", "1m30s", …).
    # Leave empty to use server defaults: 5s / 15s / 30s / 60s / 10s.
    read_header_timeout: ""
    read_timeout: ""
    write_timeout: ""
    idle_timeout: ""
    shutdown_timeout: ""

  # OAuth 2.1 Resource Server — disabled by default.
  # When enabled, every request to /mcp must carry a valid Bearer token.
  # The /health endpoint is never protected.
  oauth:
    enabled: false
    # Token issuer (iss claim). Used for OIDC Discovery when jwks_url is empty.
    # Example: "https://auth.example.com/realms/my-realm"
    issuer: ""
    # Explicit JWKS endpoint URL. Leave empty to derive from issuer via OIDC Discovery.
    # Example: "https://auth.example.com/realms/my-realm/protocol/openid-connect/certs"
    jwks_url: ""
    # Expected audience (aud claim). Leave empty to skip audience verification.
    audience: ""
    # Scopes that must appear in the token's "scope" claim.
    # Leave empty to skip scope verification. Example: ["read", "write"]
    required_scopes: []

trustStore:
  enabled: false
  secretName: ""
  secretKey: "ca.crt"
  mountPath: "/etc/ssl/certs/custom-ca"

