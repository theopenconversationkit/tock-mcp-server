replicaCount: 1

image:
  repository: ghcr.io/sacquatella/tock-mcp-server
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8083

resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10

ingress:
  enabled: false
  # className: "nginx"
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: tock-mcp.example.com
      paths:
        - path: /mcp
          pathType: Prefix
  tls: []
  #  - secretName: tock-mcp-tls
  #    hosts:
  #      - tock-mcp.example.com

nodeSelector: {}
tolerations: []
affinity: {}

# Tock MCP configuration — will be mounted as ConfigMap at /config/config.yaml
config:
  tock:
    base_url: "https://demo.tock.ai"
    namespace: "sacquatella"
    bot: "howtonet"
    connector: "howtonetweb"
    user_id: "mcp-user-001"
  server:
    addr: ":8083"


