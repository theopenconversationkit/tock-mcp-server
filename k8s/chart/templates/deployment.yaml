{{- $trustStoreEnabled := and .Values.trustStore.enabled .Values.trustStore.secretName -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tock-mcp-server.fullname" . }}
  labels:
    {{- include "tock-mcp-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tock-mcp-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Force un rolling update quand la ConfigMap change
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "tock-mcp-server.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ include "tock-mcp-server.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "-config"
            - "/config/config.yaml"
            - "-addr"
            - {{ .Values.config.server.addr | quote }}
          {{- if $trustStoreEnabled }}
          env:
            - name: SSL_CERT_FILE
              value: {{ printf "%s/%s" .Values.trustStore.mountPath .Values.trustStore.secretKey | quote }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8083
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            {{- if $trustStoreEnabled }}
            - name: trust-store
              mountPath: {{ .Values.trustStore.mountPath | quote }}
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "tock-mcp-server.fullname" . }}-config
        {{- if $trustStoreEnabled }}
        - name: trust-store
          secret:
            secretName: {{ .Values.trustStore.secretName }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
